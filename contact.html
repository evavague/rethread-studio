<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Rethread Studio</title>

  <link rel="icon" type="image/png" href="logo.png">
  <link rel="stylesheet" href="contact.css">
</head>

<body>

<div class="page">

  <main class="content">

    <header class="site-header">

      <nav class="main-nav">
        <button onclick="window.location.href='index.html'">Home</button>
        <button onclick="window.location.href='ourstory.html'">Our Story</button>
        <button onclick="window.location.href='support.html'">Support</button>
      </nav>

      <div class="icons">

        <div class="search">
          <span>⌕</span>
          <input type="text" placeholder="search">
        </div>

        <span class="icon" onclick="window.location.href='wishlist.html'">🤎</span>
        <span class="icon" onclick="window.location.href='orders.html'">📦</span>

      </div>

    </header>

    <section class="intro">
      <h1>Get In Touch!</h1>

      <p>
        Have questions, feedback, or need help? We’d love to hear from you!
      </p>
    </section>

    <section class="contact-info">

      <h2>Contact Info</h2>

      <div class="info-block">
        <p>✉ <strong>Email</strong></p>
        <p class="indent">support@rethreadstudio.com</p>
      </div>

      <div class="info-block">
        <p>☮ <strong>Socials</strong></p>

        <div class="socials">
          <p>◎ @rethreadstudio</p>
          <p>♪ @rethreadstudio</p>
        </div>
      </div>

      <div class="info-block">
        <p>◷ <strong>Operating Hours</strong></p>
        <p class="indent">
          Mon-Fri<br>
          10AM-6PM
        </p>
      </div>

    </section>

  </main>

  <img
    class="right-image"
    src="images/model-pics/_Contactpage_rightside.jpg"
    alt="Right fashion image"
  >

</div>

</body>
</html>

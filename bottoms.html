<script>
const searchInput = document.getElementById("searchInput");
const products = document.querySelectorAll(".product-card");

searchInput.addEventListener("input", () => {
  const searchValue = searchInput.value.toLowerCase();

  products.forEach(product => {
    const productName = product.querySelector("h3").textContent.toLowerCase();

    if (productName.includes(searchValue)) {
      product.style.display = "block";
    } else {
      product.style.display = "none";
    }
  });
});
</script>

<script>
function addToWishlist(button, name, size, condition, price, image) {
  localStorage.setItem("lastProductPage", window.location.pathname);

  const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

  const exists = wishlist.some(item => item.name === name);

  if (exists) {
    button.innerHTML = "✓ Added To Bag";
    button.disabled = true;
    button.classList.add("added");
    return;
  }

  wishlist.push({
    name: name,
    size: size,
    condition: condition,
    price: price,
    image: image
  });

  localStorage.setItem("wishlist", JSON.stringify(wishlist));

  button.innerHTML = "✓ Added To Bag";
  button.disabled = true;
  button.classList.add("added");
}

window.addEventListener("DOMContentLoaded", () => {
  const wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

  document.querySelectorAll(".add-btn").forEach(button => {
    const productName = button.dataset.name;

    const exists = wishlist.some(item => item.name === productName);

    if (exists) {
      button.innerHTML = "✓ Added To Bag";
      button.disabled = true;
      button.classList.add("added");
    }
  });
});
</script>
